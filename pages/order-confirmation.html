<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order confirmed — Ninja Ceramics</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" sizes="32x32" href="../assest/favicon.png">
  <meta name="theme-color" content="#1b1b12">
  <script src="../js/store.js" defer></script>
  <style>
    :root{--yellow:#e5b52c;--green:#525529;--brown-dark:#594331;--white:#f5f3ed;--black:#1b1b12;}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Poppins',sans-serif;background:var(--white);color:var(--black)}
    .wrap{padding:64px 20px;max-width:820px;margin:0 auto}
    h1{font-size:clamp(34px,5vw,64px);font-weight:900;text-transform:uppercase;letter-spacing:-.01em;line-height:.95}
    .card{margin-top:18px;background:#fff;border:1px solid rgba(0,0,0,.08);border-radius:16px;padding:18px}
    .row{display:flex;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:1px solid rgba(0,0,0,.06);font-size:13px}
    .row:last-child{border-bottom:none}
    .btn{display:inline-block;border:none;border-radius:999px;padding:12px 22px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;font-size:12px;cursor:pointer;background:var(--yellow);color:var(--black);text-decoration:none;margin-top:16px}
    .muted{color:#666;font-size:12px;line-height:1.7;margin-top:10px}
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Order<br>received</h1>
    <p class="muted">This is a demo confirmation page. Your order is saved in your browser (localStorage).</p>

    <div class="card" id="orderCard"></div>
    <a class="btn" href="../index.html">Back to home</a>
  </main>

  <script>
    function render() {
      const card = document.getElementById('orderCard');
      const order = window.NinjaStore.readLastOrder();
      if (!order) {
        card.innerHTML = '<p class="muted">No order found.</p>';
        return;
      }
      card.innerHTML = `
        <div class="row"><span><strong>Order</strong></span><span><strong>${order.id}</strong></span></div>
        <div class="row"><span>Date</span><span>${new Date(order.createdAt).toLocaleString()}</span></div>
        <div class="row"><span>Email</span><span>${order.customer.email}</span></div>
        <div class="row"><span>Delivery</span><span>${order.delivery.method === 'pickup' ? 'Pick up in studio' : 'Shipping'}</span></div>
        ${(order.delivery.method === 'shipping' && order.delivery.address) ? `
          <div class="row"><span>Address</span><span style="text-align:right;">${order.delivery.address.address1}<br>${order.delivery.address.zip} ${order.delivery.address.city}<br>${order.delivery.address.country}</span></div>
        ` : ''}
        <div style="height:10px"></div>
        ${order.lines.map(l => `
          <div class="row"><span>${l.name} × ${l.qty}</span><span>${window.NinjaStore.formatEUR(l.lineTotal)}</span></div>
        `).join('')}
        <div style="height:10px"></div>
        <div class="row"><span>Subtotal</span><span>${window.NinjaStore.formatEUR(order.totals.subtotal)}</span></div>
        <div class="row"><span>Shipping</span><span>${window.NinjaStore.formatEUR(order.totals.shipping)}</span></div>
        <div class="row"><span>Discount</span><span>-${window.NinjaStore.formatEUR(order.totals.discount)}</span></div>
        <div class="row"><span><strong>Total</strong></span><span><strong>${window.NinjaStore.formatEUR(order.totals.total)}</strong></span></div>
        <p class="muted">Payment status: <strong>${order.payment.status}</strong>. ${order.payment.note}</p>
      `;
    }
    document.addEventListener('DOMContentLoaded', render);
  </script>
</body>
</html>
