<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cart — Ninja Ceramics</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" sizes="32x32" href="../assest/favicon.png">
  <meta name="theme-color" content="#1b1b12">
  <script src="../js/store.js" defer></script>
  <style>
    :root{--yellow:#e5b52c;--green:#525529;--brown-dark:#594331;--white:#f5f3ed;--black:#1b1b12;}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Poppins',sans-serif;background:var(--white);color:var(--black)}
    nav{position:sticky;top:0;z-index:10;background:var(--black);height:68px;display:flex;align-items:center;justify-content:space-between;padding:0 48px}
    .nav-logo img{height:38px;object-fit:contain}
    .nav-links{list-style:none;display:flex;gap:26px;align-items:center}
    .nav-links a{color:var(--white);text-decoration:none;font-size:11.5px;letter-spacing:.08em;text-transform:uppercase}
    .wrap{padding:54px 60px;max-width:1100px;margin:0 auto}
    h1{font-size:clamp(34px,5vw,60px);font-weight:800;letter-spacing:-.01em;text-transform:uppercase}
    .grid{display:grid;grid-template-columns:1.3fr .7fr;gap:24px;margin-top:28px}
    .card{background:#fff;border:1px solid rgba(0,0,0,.08);border-radius:16px;padding:18px}
    .line{display:grid;grid-template-columns:1fr auto auto;gap:12px;align-items:center;padding:12px 0;border-bottom:1px solid rgba(0,0,0,.06)}
    .line:last-child{border-bottom:none}
    .name{font-weight:700;text-transform:uppercase;letter-spacing:.1em;font-size:11px}
    .price{font-weight:800;color:var(--brown-dark)}
    .qty{width:74px;padding:10px 12px;border-radius:10px;border:1px solid rgba(0,0,0,.14);font-family:'Poppins',sans-serif}
    .btn{display:inline-block;border:none;border-radius:999px;padding:12px 22px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;font-size:12px;cursor:pointer}
    .btn-primary{background:var(--yellow);color:var(--black)}
    .btn-outline{background:transparent;border:2px solid rgba(0,0,0,.35)}
    .sum-row{display:flex;justify-content:space-between;margin:10px 0;color:#333;font-size:14px}
    .sum-row strong{font-weight:900}
    .empty{margin-top:18px;color:#666;line-height:1.7}
    @media(max-width:960px){
      nav{padding:0 20px}
      .wrap{padding:42px 20px}
      .grid{grid-template-columns:1fr}
      .btn{display:block;width:100%;text-align:center;margin-top:8px}
    }
  </style>
</head>
<body>
  <nav>
    <div class="nav-logo"><a href="../index.html"><img alt="Ninja Ceramics" src="../assest/logo.png"></a></div>
    <ul class="nav-links">
      <li><a href="../index.html">Home</a></li>
      <li><a href="checkout.html">Checkout</a></li>
    </ul>
  </nav>

  <main class="wrap">
    <h1>Cart</h1>
    <div class="grid">
      <section class="card">
        <div id="cartLines"></div>
        <div id="emptyState" class="empty" style="display:none;">
          Your cart is empty. Go back to the <a href="../index.html" style="color:var(--green);font-weight:800;text-decoration:none;">shop</a>.
        </div>
      </section>

      <aside class="card">
        <div class="sum-row"><span>Subtotal</span><strong id="subtotal">€0</strong></div>
        <div class="sum-row"><span>Estimated shipping</span><strong>—</strong></div>
        <div class="sum-row" style="border-top:1px solid rgba(0,0,0,.08);padding-top:12px;"><span>Total</span><strong id="total">€0</strong></div>
        <div style="display:flex;gap:10px;margin-top:16px;flex-wrap:wrap;">
          <button class="btn btn-outline" id="clearBtn" type="button">Clear</button>
          <a class="btn btn-primary" href="checkout.html" style="text-decoration:none;">Checkout</a>
        </div>
        <p style="margin-top:14px;color:#666;font-size:12px;line-height:1.6;">
          Payments are not connected yet (Stripe integration needed). You can still complete the checkout flow to test it.
        </p>
      </aside>
    </div>
  </main>

  <script>
    function render() {
      const linesWrap = document.getElementById('cartLines');
      const empty = document.getElementById('emptyState');
      const subtotalEl = document.getElementById('subtotal');
      const totalEl = document.getElementById('total');

      const lines = window.NinjaStore.cartLines();
      const subtotal = window.NinjaStore.calcSubtotal(lines);
      subtotalEl.textContent = window.NinjaStore.formatEUR(subtotal);
      totalEl.textContent = window.NinjaStore.formatEUR(subtotal);

      if (!lines.length) {
        linesWrap.innerHTML = '';
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';

      linesWrap.innerHTML = lines.map(l => `
        <div class="line">
          <div>
            <div class="name">${l.name}</div>
            <div style="color:#666;font-size:12px;margin-top:4px;">${window.NinjaStore.formatEUR(l.price)} each</div>
          </div>
          <input class="qty" type="number" min="0" value="${l.qty}" data-qty="${l.id}">
          <div class="price">${window.NinjaStore.formatEUR(l.lineTotal)}</div>
        </div>
      `).join('');
    }

    document.addEventListener('input', (e) => {
      const el = e.target;
      if (!(el instanceof HTMLInputElement)) return;
      const id = el.getAttribute('data-qty');
      if (!id) return;
      window.NinjaStore.setQty(id, el.value);
    });
    window.addEventListener('ninja:cart-changed', render);
    document.getElementById('clearBtn').addEventListener('click', () => window.NinjaStore.clearCart());
    document.addEventListener('DOMContentLoaded', render);
  </script>
</body>
</html>
